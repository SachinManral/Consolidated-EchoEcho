<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Echo Echo — Docs</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @keyframes float-glow{0%,100%{box-shadow:0 0 60px rgba(192,88,255,.12),0 0 120px rgba(192,88,255,.06)}50%{box-shadow:0 0 80px rgba(192,88,255,.18),0 0 160px rgba(192,88,255,.09)}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
      background:#07070f;
      color:#e8e8f0;
      -webkit-font-smoothing:antialiased;
      font-size:16px;
      line-height:1.75;
      min-height:100vh;
    }

    /* ── AMBIENT BG ── */
    body::before{
      content:'';
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 80vw 60vh at 15% 10%, rgba(120,40,255,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60vw 50vh at 85% 80%, rgba(255,50,80,.08) 0%, transparent 60%),
        radial-gradient(ellipse 100vw 80vh at 50% 50%, rgba(10,10,30,.9) 0%, transparent 100%);
    }

    :root{
      --nav-h:60px;
      --sidebar-w:300px;
      --grad:linear-gradient(135deg,#ff5858 0%,#c058ff 100%);
      --grad-text:linear-gradient(135deg,#ff6b6b 0%,#c77dff 100%);
      --glass:rgba(255,255,255,.04);
      --glass-border:rgba(255,255,255,.08);
      --glass-strong:rgba(255,255,255,.07);
      --text:#e8e8f0;
      --text-muted:#888;
      --text-dim:#aaa;
      --accent:#c084fc;
      --accent2:#ff6b6b;
      --dark-card:rgba(255,255,255,.035);
    }

    /* ── TOP NAV ── */
    .topnav{
      position:fixed;top:0;left:0;right:0;z-index:9999;
      height:var(--nav-h);
      background:rgba(7,7,15,.7);
      backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,.07);
      display:flex;align-items:center;padding:0 1.5rem;gap:.75rem;
    }
    .nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;flex-shrink:0}
    .nav-logo-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    
    .nav-wordmark{font-size:1rem;font-weight:800;letter-spacing:-.03em;color:#fff}
    .nav-wordmark em{font-style:normal;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .nav-sep{width:1px;height:16px;background:rgba(255,255,255,.1);flex-shrink:0}
    .nav-tag{font-size:.78rem;font-weight:600;color:var(--text-muted);letter-spacing:.01em}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
    .nav-link{font-size:.84rem;font-weight:500;color:var(--text-muted);text-decoration:none;padding:.3rem .65rem;border-radius:6px;transition:background .15s,color .15s}
    .nav-link:hover{background:rgba(255,255,255,.06);color:#fff}
    .nav-btn{
      font-size:.84rem;font-weight:700;color:#fff;
      background:var(--grad);
      padding:.35rem .9rem;border-radius:7px;text-decoration:none;
      box-shadow:0 0 12px rgba(192,88,255,.3);
      transition:opacity .15s,box-shadow .15s;
    }
    .nav-btn:hover{opacity:.9;box-shadow:0 0 20px rgba(192,88,255,.5)}
    .nav-version{font-size:.72rem;font-weight:700;background:rgba(255,255,255,.07);color:var(--text-muted);padding:.2rem .55rem;border-radius:20px;border:1px solid rgba(255,255,255,.08);letter-spacing:.02em}

    /* ── LAYOUT ── */
    .layout{display:flex;margin-top:var(--nav-h);min-height:calc(100vh - var(--nav-h));position:relative;z-index:1}

    /* ── SIDEBAR ── */
    .sidebar{
      width:var(--sidebar-w);
      flex-shrink:0;
      position:sticky;top:var(--nav-h);
      height:calc(100vh - var(--nav-h));
      overflow-y:auto;
      border-right:1px solid rgba(255,255,255,.06);
      padding:1.5rem 0 3rem;
      background:rgba(7,7,15,.6);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }
    .sidebar::-webkit-scrollbar{width:3px}
    .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}

    .sidenav-group{margin-bottom:1.5rem}
    .sidenav-label{
      font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:rgba(255,255,255,.28);padding:.2rem 1.4rem .4rem;display:block;
    }
    .sidenav-item{
      display:flex;align-items:center;gap:.5rem;
      padding:.44rem 1.4rem;font-size:.9rem;font-weight:500;
      color:rgba(255,255,255,.55);text-decoration:none;cursor:pointer;
      border-left:2px solid transparent;
      transition:all .15s;
    }
    .sidenav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.9)}
    .sidenav-item.active{
      background:rgba(192,88,255,.1);
      color:#d8aaff;
      border-left-color:#c084fc;
      font-weight:600;
    }
    .method-badge{
      font-size:.6rem;font-weight:700;letter-spacing:.05em;
      padding:.15rem .4rem;border-radius:4px;flex-shrink:0;
      font-family:'JetBrains Mono',monospace;
    }
    .badge-post{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
    .badge-get{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.2)}

    /* ── CONTENT ── */
    .content{flex:1;padding:3rem 4.5rem 5rem;max-width:900px;min-width:0;animation:fade-up .3s ease}

    /* ── HEADINGS ── */
    .page-header{margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid rgba(255,255,255,.07)}
    .page-eyebrow{
      font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
      background:var(--grad-text);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:.65rem;display:block;
    }
    .page-title{
      font-size:2.25rem;font-weight:900;letter-spacing:-.045em;line-height:1.12;
      color:#fff;margin-bottom:.85rem;
    }
    .page-desc{font-size:1.05rem;color:var(--text-dim);line-height:1.7;max-width:660px}

    h2{
      font-size:1.3rem;font-weight:700;letter-spacing:-.025em;color:#fff;
      margin:2.5rem 0 1rem;
      display:flex;align-items:center;gap:.6rem;
    }
    h2::before{content:'';width:3px;height:18px;border-radius:3px;background:var(--grad);flex-shrink:0}
    h3{font-size:1.05rem;font-weight:600;letter-spacing:-.02em;color:rgba(255,255,255,.9);margin:1.75rem 0 .65rem}
    p{margin-bottom:1rem;color:var(--text-dim);font-size:1rem;line-height:1.75}
    ul,ol{padding-left:1.4rem;margin-bottom:1rem}
    li{margin-bottom:.4rem;font-size:1rem;color:var(--text-dim)}
    li strong{color:#fff}
    a{color:var(--accent);text-decoration:none;transition:color .15s}
    a:hover{color:#d8aaff;text-decoration:underline}
    code{
      font-family:'JetBrains Mono',monospace;font-size:.83em;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      padding:.15em .4em;border-radius:5px;color:#d8aaff;
    }
    strong{color:#fff;font-weight:600}

    /* ── GLASS CARD ── */
    .glass-card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);
    }

    /* ── CARD GRID ── */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.9rem;margin:1rem 0 1.75rem}
    .card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:12px;padding:1.2rem;
      transition:border-color .2s,background .2s,box-shadow .2s;
      backdrop-filter:blur(8px);
    }
    .card:hover{
      border-color:rgba(192,88,255,.35);
      background:rgba(192,88,255,.07);
      box-shadow:0 0 20px rgba(192,88,255,.1);
    }
    .card-icon{font-size:1.4rem;margin-bottom:.6rem}
    .card-name{font-size:.94rem;font-weight:700;color:#fff;margin-bottom:.3rem}
    .card-desc{font-size:.84rem;color:var(--text-muted);line-height:1.6}

    /* ── CODE BLOCK ── */
    .code-block{
      background:rgba(0,0,0,.5);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;overflow:hidden;margin:1rem 0 1.5rem;
      box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);
    }
    .code-block-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:.6rem 1.1rem;
      background:rgba(255,255,255,.03);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .code-block-lang{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);font-family:'JetBrains Mono',monospace}
    .copy-btn{
      font-size:.72rem;font-weight:600;color:rgba(255,255,255,.35);
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
      border-radius:5px;padding:.28rem .65rem;cursor:pointer;
      font-family:'Inter',sans-serif;transition:all .15s;
    }
    .copy-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
    .copy-btn.copied{color:#4ade80;border-color:rgba(74,222,128,.3)}
    pre{padding:1.15rem 1.3rem;overflow-x:auto;line-height:1.7}
    pre code{background:none;padding:0;border:none;color:#d4d4d8;font-size:.875rem;border-radius:0}
    .tk-kw{color:#c084fc}
    .tk-str{color:#86efac}
    .tk-cm{color:#52525b;font-style:italic}
    .tk-fn{color:#93c5fd}
    .tk-num{color:#fdba74}
    .tk-key{color:#67e8f9}
    .tk-op{color:#94a3b8}

    /* ── CODE TABS ── */
    .code-tabs{
      margin:1rem 0 1.5rem;border-radius:12px;overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 4px 20px rgba(0,0,0,.4);
    }
    .tab-bar{
      display:flex;
      background:rgba(255,255,255,.03);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    .tab-btn{
      padding:.55rem 1.15rem;font-size:.82rem;font-weight:600;
      font-family:'Inter',sans-serif;
      background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);
      border-bottom:2px solid transparent;margin-bottom:-1px;
      transition:color .15s,border-color .15s;
    }
    .tab-btn.active{color:#c084fc;border-bottom-color:#c084fc}
    .tab-btn:hover:not(.active){color:rgba(255,255,255,.7)}
    .tab-content{display:none;background:rgba(0,0,0,.45)}
    .tab-content.active{display:block}
    .tab-content pre{border-radius:0;margin:0}

    /* ── CALLOUT ── */
    .callout{
      border-radius:11px;padding:1rem 1.2rem;margin:1.25rem 0;font-size:.95rem;
      display:flex;gap:.8rem;align-items:flex-start;
      backdrop-filter:blur(8px);
    }
    .callout-info{background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.2);color:#7dd3fc}
    .callout-warn{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);color:#fcd34d}
    .callout-tip{background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);color:#6ee7b7}
    .callout-danger{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);color:#fca5a5}
    .callout-icon{font-size:1.1rem;flex-shrink:0;margin-top:.05rem}
    .callout p{margin:0;color:inherit;font-size:.93rem}
    .callout strong{color:inherit}

    /* ── PARAM TABLE ── */
    .param-table{width:100%;border-collapse:collapse;margin:1rem 0 1.5rem;font-size:.9rem}
    .param-table th{
      text-align:left;padding:.65rem 1rem;
      background:rgba(255,255,255,.04);
      font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;
      color:rgba(255,255,255,.35);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    .param-table td{padding:.7rem 1rem;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:top;color:var(--text-dim)}
    .param-table tr:last-child td{border-bottom:none}
    .param-table code{font-size:.8rem}
    .param-table tr:hover td{background:rgba(255,255,255,.02)}
    .param-req{font-size:.67rem;font-weight:700;padding:.18rem .44rem;border-radius:4px;background:rgba(248,113,113,.15);color:#fca5a5;border:1px solid rgba(248,113,113,.2);letter-spacing:.03em}
    .param-opt{font-size:.67rem;font-weight:700;padding:.18rem .44rem;border-radius:4px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08);letter-spacing:.03em}

    /* ── ENDPOINT ── */
    .endpoint{
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;overflow:hidden;margin:1.5rem 0 2.5rem;
      box-shadow:0 4px 24px rgba(0,0,0,.3);
      backdrop-filter:blur(8px);
    }
    .endpoint-header{
      display:flex;align-items:center;gap:.75rem;
      padding:1rem 1.3rem;
      background:rgba(255,255,255,.04);
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    .endpoint-method{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;padding:.3rem .75rem;border-radius:6px;letter-spacing:.05em}
    .method-post{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
    .method-get{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.2)}
    .endpoint-path{font-family:'JetBrains Mono',monospace;font-size:.92rem;font-weight:500;color:#fff}
    .endpoint-desc{font-size:.83rem;color:var(--text-muted);margin-left:auto}
    .endpoint-body{padding:1.4rem}
    .endpoint-body h4{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.3);margin-bottom:.85rem;margin-top:1.4rem}
    .endpoint-body h4:first-child{margin-top:0}

    /* ── STEP LIST ── */
    .step-list{list-style:none;padding:0;counter-reset:step;margin:1rem 0}
    .step-list li{counter-increment:step;display:flex;gap:1rem;margin-bottom:1.4rem;align-items:flex-start}
    .step-list li::before{
      content:counter(step);
      width:30px;height:30px;border-radius:50%;
      background:var(--grad);
      color:#fff;font-size:.78rem;font-weight:800;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;margin-top:.05rem;
      box-shadow:0 0 12px rgba(192,88,255,.3);
    }
    .step-body{flex:1}
    .step-title{font-weight:700;color:#fff;margin-bottom:.3rem;font-size:.97rem}
    .step-desc{font-size:.91rem;color:var(--text-muted);line-height:1.6}

    /* ── ARCH DIAGRAM ── */
    .arch{
      display:flex;flex-direction:column;gap:.75rem;
      margin:1.5rem 0;padding:1.5rem;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.07);
      border-radius:14px;
      backdrop-filter:blur(12px);
    }
    .arch-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .arch-box{padding:.45rem .95rem;border-radius:8px;font-size:.8rem;font-weight:600;border:1px solid;white-space:nowrap;backdrop-filter:blur(4px)}
    .arch-arrow{color:rgba(255,255,255,.3);font-size:1rem;flex-shrink:0}
    .arch-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.25);flex-shrink:0;min-width:90px}

    /* ── RESPONSE BOX ── */
    .response-box{
      background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.07);
      border-radius:10px;padding:1rem 1.2rem;margin:.75rem 0;
    }
    .response-status{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;margin-bottom:.5rem}
    .status-200{color:#34d399}
    .status-400{color:#fbbf24}
    .status-401{color:#fb923c}
    .status-500{color:#f87171}

    /* ── FEATURE LIST ── */
    .feature-list{list-style:none;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:1rem 0}
    .feature-list li{
      display:flex;align-items:flex-start;gap:.6rem;font-size:.9rem;color:var(--text-dim);
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
      border-radius:9px;padding:.65rem .9rem;
    }
    .feature-list li::before{content:'✦';color:var(--accent);font-size:.7rem;margin-top:.2rem;flex-shrink:0}

    /* ── PREV / NEXT ── */
    .pagination{display:flex;gap:1rem;margin-top:3.5rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.07)}
    .page-nav{
      flex:1;padding:1.1rem 1.3rem;
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;cursor:pointer;
      background:rgba(255,255,255,.03);
      text-decoration:none;
      transition:border-color .15s,background .15s,box-shadow .15s;display:block;
      backdrop-filter:blur(8px);
    }
    .page-nav:hover{
      border-color:rgba(192,88,255,.4);
      background:rgba(192,88,255,.07);
      box-shadow:0 0 20px rgba(192,88,255,.12);
      text-decoration:none;
    }
    .page-nav.prev{text-align:left}
    .page-nav.next{text-align:right}
    .page-nav-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text-muted);margin-bottom:.3rem}
    .page-nav-title{font-size:.95rem;font-weight:700;color:#fff}
    .page-nav-arrow{color:var(--accent)}
    .page-nav-spacer{flex:1}

    /* ── INLINE CODE IN TABLES ── */
    td code{color:#d8aaff}

    /* ── HAMBURGER BUTTON ── */
    .hamburger{
      display:none;flex-direction:column;justify-content:center;gap:5px;
      width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.05);cursor:pointer;padding:8px;
      flex-shrink:0;transition:background .15s,border-color .15s;
    }
    .hamburger:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.18)}
    .hamburger span{
      display:block;height:1.5px;border-radius:2px;background:#fff;
      transition:transform .25s,opacity .25s,width .25s;
      transform-origin:center;
    }
    .hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
    .hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

    /* ── MOBILE OVERLAY ── */
    .sidebar-overlay{
      display:none;position:fixed;inset:0;z-index:8888;
      background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
      opacity:0;transition:opacity .25s;
    }
    .sidebar-overlay.visible{opacity:1}

    @media(max-width:900px){
      .hamburger{display:flex}
      .nav-link,.nav-sep,.nav-tag{display:none}

      .sidebar{
        position:fixed;top:var(--nav-h);left:0;
        height:calc(100vh - var(--nav-h));
        z-index:8999;
        transform:translateX(-100%);
        transition:transform .28s cubic-bezier(.4,0,.2,1);
        border-right:1px solid rgba(255,255,255,.1);
        box-shadow:8px 0 40px rgba(0,0,0,.5);
      }
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay{display:block}

      .content{padding:2rem 1.25rem}
      .feature-list{grid-template-columns:1fr}
      .card-grid{grid-template-columns:1fr}
      .endpoint-header{flex-wrap:wrap;gap:.5rem}
      .endpoint-desc{margin-left:0;width:100%}
      .pagination{flex-direction:column}
      .page-nav-spacer{display:none}
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<nav class="topnav">
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <a class="nav-logo" href="/">

];

const FLAT = NAV.filter(n => n.path);
const prevPage = path => { const i = FLAT.findIndex(n => n.path === path); return i > 0 ? FLAT[i-1] : null; };
const nextPage = path => { const i = FLAT.findIndex(n => n.path === path); return i < FLAT.length-1 ? FLAT[i+1] : null; };

// ─── ROUTER ──────────────────────────────────────────────────────────────────
function navigate(path) {
  history.pushState(null, '', path);
  render(path);
}
window.addEventListener('popstate', () => render(location.pathname));

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar(active) {
  document.getElementById('sidenav').innerHTML = '<div class="sidenav-group">' + NAV.map(n => {
    if (n.group) return `<span class="sidenav-label">${n.group}</span>`;
    const cls = n.path === active ? ' active' : '';
    const badge = n.method ? `<span class="method-badge badge-${n.method.toLowerCase()}">${n.method}</span>` : '';
    return `<a class="sidenav-item${cls}" href="${n.path}" onclick="navigate('${n.path}');return false;">${badge}${n.label}</a>`;
  }).join('') + '</div>';
}

// ─── PAGINATION ──────────────────────────────────────────────────────────────
function paginationHTML(path) {
  const prev = prevPage(path), next = nextPage(path);
  if (!prev && !next) return '';
  const p = prev ? `<a class="page-nav prev" href="${prev.path}" onclick="navigate('${prev.path}');return false;"><div class="page-nav-label"><span class="page-nav-arrow">←</span> Previous</div><div class="page-nav-title">${prev.label}</div></a>` : '<div class="page-nav-spacer"></div>';
  const n = next ? `<a class="page-nav next" href="${next.path}" onclick="navigate('${next.path}');return false;"><div class="page-nav-label">Next <span class="page-nav-arrow">→</span></div><div class="page-nav-title">${next.label}</div></a>` : '<div class="page-nav-spacer"></div>';
  return `<div class="pagination">${p}${n}</div>`;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function cb(lang, code) {
  return `<div class="code-block"><div class="code-block-header"><span class="code-block-lang">${lang}</span><button class="copy-btn" onclick="doCopy(this)">Copy</button></div><pre><code>${code}</code></pre></div>`;
}

function tabs(items) {
  const id = 'ct' + Math.random().toString(36).slice(2,7);
  const btns = items.map((t,i) => `<button class="tab-btn${i===0?' active':''}" onclick="switchTab('${id}',${i})">${t.l}</button>`).join('');
  const panes = items.map((t,i) => `<div class="tab-content${i===0?' active':''}"><pre><code>${t.c}</code></pre></div>`).join('');
  return `<div class="code-tabs" id="${id}"><div class="tab-bar">${btns}</div>${panes}</div>`;
}

function switchTab(id, idx) {
  const el = document.getElementById(id);
  el.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  el.querySelectorAll('.tab-content').forEach((p,i) => p.classList.toggle('active', i===idx));
}

function doCopy(btn) {
  const pre = btn.closest('.code-block,.code-tabs').querySelector('.active pre, pre');
  navigator.clipboard.writeText(pre.querySelector('code').textContent).then(() => {
    btn.textContent = '✓ Copied'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
  });
}

<ol class="step-list">

<div class="page-header">
  <span class="page-eyebrow">Setup</span>
  <h1 class="page-title">Environment Variables</h1>
  <p class="page-desc">All configurable environment variables for Echo Echo — what each does, when it's required, and what happens if it's missing.</p>
</div>

<table class="param-table">
  <tr><th>Variable</th><th>Required</th><th>Default</th><th>Description</th></tr>
  <tr><td><code>GROQ_API_KEY</code></td><td><span class="param-req">Required</span></td><td>—</td><td>Groq API key. Powers the lyrics writer and copyright agent (Llama 3.1 8B Instant). Get one at <strong>console.groq.com</strong> — free tier available.</td></tr>
  <tr><td><code>KIEAI_API_KEY</code></td><td><span class="param-opt">Optional</span></td><td>—</td><td>Kie.AI API key. Enables <code>api</code> mode music generation via Suno v4. Without this key, only local MusicGen is available. Get one at <strong>kie.ai</strong>.</td></tr>
  <tr><td><code>PUBLIC_BASE_URL</code></td><td><span class="param-opt">Optional*</span></td><td>—</td><td>The publicly reachable base URL of your deployment. Required when <code>KIEAI_API_KEY</code> is set — Kie.AI posts audio-ready callbacks back to <code>{PUBLIC_BASE_URL}/api/kieai/callback</code>.</td></tr>
  <tr><td><code>ECHO_SIGNUPS_OPEN</code></td><td><span class="param-opt">Optional</span></td><td><code>""</code></td><td>Set to <code>"1"</code> to allow <code>POST /api/auth/signup</code>. Any other value (or unset) returns HTTP 403 — invite-only mode.</td></tr>
</table>

<div class="callout callout-danger">
  <span class="callout-icon">🚨</span>
  <p><strong>PUBLIC_BASE_URL must be publicly reachable.</strong> <code>http://localhost:8000</code> will not work in production — Kie.AI's servers can't reach your laptop. In production this must be your Render URL: <code>https://consolidated-echoecho.onrender.com</code>.</p>
</div>

<h2>Example .env</h2>
${cb('bash', `# .env — never commit this file
GROQ_API_KEY=gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
KIEAI_API_KEY=kie_xxxxxxxxxxxxxxxxxxxxxxxxxx
PUBLIC_BASE_URL=https://consolidated-echoecho.onrender.com
ECHO_SIGNUPS_OPEN=1`)}

<h2>How missing config is handled</h2>
<p>Echo Echo is designed to degrade gracefully. At startup, <code>validate_kieai_config()</code> is called inside a <code>try/except</code>:</p>
${cb('python', `# backend/main.py
@asynccontextmanager
async def lifespan(_: FastAPI) -> AsyncIterator[None]:
    ensure_files()           # create dirs + JSON files if missing
    try:
        validate_kieai_config()   # checks KIEAI_API_KEY + PUBLIC_BASE_URL
    except Exception as exc:
        # App starts anyway — KieAI mode is just disabled
        logger.warning("KieAI config invalid — API generation disabled: %s", exc)
    Thread(target=warm_model, daemon=True).start()  # load MusicGen in background
    yield`)}

<p>The result: <code>GROQ_API_KEY</code> missing → lyrics/copyright agents fail silently per-request. <code>KIEAI_API_KEY</code> missing → POST /api/generate returns HTTP 500. Neither crashes the server at startup.</p>

<h2>Getting API keys</h2>
<table class="param-table">
  <tr><th>Service</th><th>URL</th><th>Free tier</th></tr>
  <tr><td>Groq (Llama 3.1)</td><td>console.groq.com</td><td>Yes — generous rate limits</td></tr>
  <tr><td>Kie.AI (Suno v4)</td><td>kie.ai</td><td>Limited credits on sign-up</td></tr>
</table>
`,

<h2>Polling generation status</h2>
<p>Generation takes 30–90 seconds. Poll <code>GET /generation-status</code> every 2 seconds to show a live progress bar:</p>
${tabs([
  { l: 'JavaScript', c: `// Poll every 2 seconds until generation completes
function pollGenerationStatus(onProgress, onComplete) {
  let attempts = 0;
  const MAX = 90; // 3 minutes max

  const iv = setInterval(async () => {
    if (++attempts > MAX) { clearInterval(iv); return; }

    const status = await fetch("/generation-status").then(r => r.json());
    const { stage, progress, elapsed_seconds, estimated_remaining_seconds, active } = status;

    onProgress({ stage, progress, elapsed_seconds, estimated_remaining_seconds });

    if (!active) {
      clearInterval(iv);
      onComplete(status);
    }
  }, 2000);

  return () => clearInterval(iv); // returns cancel function
}

// Usage
const cancel = pollGenerationStatus(
  ({ stage, progress }) => {
    document.getElementById("progress").style.width = progress + "%";
    document.getElementById("stage").textContent = stage;
  },
  () => { console.log("Done! Fetch song from /history"); }
);` },
  { l: 'Python', c: `import httpx, time

def poll_until_done(base_url: str, poll_interval: float = 2.0, timeout: float = 300.0) -> dict:
    """Poll /generation-status until active=False. Returns last status."""
    deadline = time.time() + timeout
    with httpx.Client() as client:
        while time.time() < deadline:
            r = client.get(f"{base_url}/generation-status")
            s = r.json()
            print(f"[{s['progress']:3d}%] {s['stage']:30s}  {s['elapsed_seconds']}s elapsed")
            if not s.get("active"):
                return s
            time.sleep(poll_interval)
    raise TimeoutError(f"Generation did not complete within {timeout}s")

status = poll_until_done("https://consolidated-echoecho.onrender.com")
print("Final status:", status)` },
])}

<h2>How lyrics are generated</h2>

from langchain_groq import ChatGroq

llm = ChatGroq(
    model="llama-3.1-8b-instant",
    api_key=os.getenv("GROQ_API_KEY"),
    temperature=0.8,
)

lyricist = Agent(
    role="Professional Lyricist",
    goal="Write emotionally resonant, commercially viable song lyrics",
    backstory=(
        "A Grammy-nominated lyricist with 20 years across pop, indie, and film scoring. "
        "Writes in the voice of the style — never generic, always evocative."
    ),
    llm=llm,
    verbose=False,
)

task = Task(
    description=(
        f"Write original song lyrics for a {mood} {style} track about {theme}. "
        f"BPM: {tempo}, energy: {energy}/10, structure: verse/pre-chorus/chorus/bridge. "
        "Return JSON with keys 'text' (full lyrics) and 'structure' (e.g. 'verse/chorus')."
    ),
    expected_output="JSON object with text and structure keys",
    agent=lyricist,
)

crew = Crew(agents=[lyricist], tasks=[task], verbose=False)
result = crew.kickoff()`)}

'/docs/deployment': () => `
<div class="page-header">
  <span class="page-eyebrow">Deploy</span>
  <h1 class="page-title">Render Deployment</h1>
  <p class="page-desc">Deploy Echo Echo to production on Render in under 5 minutes. One service, zero separate frontend host needed.</p>
</div>

<div class="callout callout-tip">
  <span class="callout-icon">✅</span>
  <p><strong>Single-service architecture:</strong> FastAPI serves the backend API <em>and</em> all HTML frontend pages via <code>FileResponse</code>. One Render web service covers everything — no CDN, no separate static host.</p>
</div>

<h2>Step-by-step</h2>
<ol class="step-list">
  <li><div class="step-body"><div class="step-title">Push to GitHub</div><div class="step-desc">All changes committed and pushed to <code>github.com/simplysandeepp/Consolidated-EchoEcho</code>. Render deploys from this repo.</div></div></li>
  <li><div class="step-body"><div class="step-title">Create a Render account</div><div class="step-desc">Go to <strong>render.com</strong> → sign up with GitHub. Free tier works fine for personal/demo use.</div></div></li>
  <li><div class="step-body"><div class="step-title">New → Web Service → Connect GitHub</div><div class="step-desc">Select your repo. Render auto-detects <code>render.yaml</code> and fills in build/start commands. Review and confirm.</div></div></li>
  <li><div class="step-body"><div class="step-title">Add environment variables in Render dashboard</div><div class="step-desc">Go to Environment → Add <code>GROQ_API_KEY</code> and (optionally) <code>KIEAI_API_KEY</code>. <code>PUBLIC_BASE_URL</code> is already hardcoded in <code>render.yaml</code>.</div></div></li>
  <li><div class="step-body"><div class="step-title">Deploy</div><div class="step-desc">Click <em>Create Web Service</em>. Build takes ~2 minutes (pip install). Service starts and your app is live.</div></div></li>
</ol>

<h2>render.yaml explained</h2>
${cb('yaml', `services:
  - type: web
    name: echo-echo          # service display name in Render
    runtime: python          # Python runtime
    plan: free               # free tier (ephemeral filesystem)
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    # $PORT is set automatically by Render (usually 10000)
    envVars:
      - key: GROQ_API_KEY
        sync: false          # must be set manually in Render dashboard
      - key: KIEAI_API_KEY
        sync: false          # optional — enables Kie.AI music generation
      - key: PUBLIC_BASE_URL
        value: https://consolidated-echoecho.onrender.com  # already set
      - key: PYTHON_VERSION
        value: 3.12.6`)}

<h2>What's available after deploy</h2>
<table class="param-table">
  <tr><th>URL</th><th>Content</th></tr>
  <tr><td><code>/</code></td><td>Landing page (Three.js wave background)</td></tr>

  <tr><td><code>/dashboard.html</code></td><td>Song generator UI</td></tr>

  <tr><td><code>/api/docs</code></td><td>Swagger / OpenAPI interactive docs</td></tr>
  <tr><td><code>/health</code></td><td>Health check JSON</td></tr>

</table>

<div class="callout callout-warn">
  <span class="callout-icon">⚠️</span>
  <p><strong>Ephemeral filesystem:</strong> Render free tier resets disk on every deploy. Generated MP3s in <code>backend/generated/</code> and <code>song_history.json</code> are lost. Solutions: attach a <strong>Render Disk</strong> (paid), or store audio on S3/R2/Cloudflare and persist history in a DB.</p>
</div>

<h2>Auto-deploy on push</h2>
${cb('bash', `# Every git push to main triggers a new Render deploy
git add .
git commit -m "feat: add new feature"
git push origin main
# → Render detects push → starts build → deploy live in ~2 min`)}

'/docs/troubleshooting': () => `
<div class="page-header">
  <span class="page-eyebrow">Deploy</span>
  <h1 class="page-title">Troubleshooting</h1>
  <p class="page-desc">Common issues and how to fix them.</p>
</div>

<h2>Server shows "Not Found" on Render</h2>
<p><strong>Cause:</strong> App crashed at startup before it could serve any routes.</p>
<ol class="step-list">
  <li><div class="step-body"><div class="step-title">Check Render logs</div><div class="step-desc">Go to your Render service → Logs. Look for Python tracebacks or startup errors.</div></div></li>
  <li><div class="step-body"><div class="step-title">Most common cause: missing env var</div><div class="step-desc">If <code>KIEAI_API_KEY</code> is set but <code>PUBLIC_BASE_URL</code> is missing or localhost, <code>validate_kieai_config()</code> used to crash. Verify both are set in Render's Environment section.</div></div></li>
  <li><div class="step-body"><div class="step-title">Redeploy after adding env vars</div><div class="step-desc">After adding environment variables, Render does not automatically redeploy. Click <em>Manual Deploy → Deploy latest commit</em>.</div></div></li>
</ol>

<h2>Audio generation fails (HTTP 500)</h2>
${cb('json', `{"detail": "API song generation failed. Please try again."}`)}
<ul>
  <li>Check that <code>KIEAI_API_KEY</code> is correctly set (no extra spaces)</li>
  <li>Verify your Kie.AI account has remaining credits</li>
  <li>Check that <code>PUBLIC_BASE_URL</code> matches your actual Render URL exactly (no trailing slash)</li>
  <li>Look in Render logs for <code>KieAI request error:</code> messages with the actual API response</li>
</ul>

<h2>Lyrics always say "unavailable"</h2>
<ul>
  <li>Verify <code>GROQ_API_KEY</code> is set — the key must start with <code>gsk_</code></li>
  <li>Check Groq rate limits at console.groq.com — free tier has requests-per-minute limits</li>
  <li>Check Render logs for <code>Lyrics generation unavailable:</code> and read the error message</li>
</ul>

<h2>Trim fails with "FFmpeg required"</h2>
${cb('json', `{"detail": "FFmpeg is required for trimming but was not found on the system PATH."}`)}
<ul>
  <li>On Render, FFmpeg is available by default — this error shouldn't occur</li>
  <li>Locally: install FFmpeg with <code>brew install ffmpeg</code> (macOS) or <code>sudo apt install ffmpeg</code> (Linux)</li>
  <li>Verify installation: <code>ffmpeg -version</code></li>
</ul>

<h2>Sign-up returns HTTP 403</h2>
${cb('json', `{"detail": "Sign-ups are temporarily closed — Echo Echo is in invite-only beta."}`)}
<p>Set <code>ECHO_SIGNUPS_OPEN=1</code> in your environment or Render dashboard, then redeploy.</p>

<h2>MusicGen stuck on "loading"</h2>
<p>MusicGen requires downloading ~250MB of model weights on first run. On Render free tier this can take 5–15 minutes. The model is also re-downloaded every deploy because the filesystem is ephemeral. Consider using only <code>api</code> mode on Render.</p>

<h2>Generated audio 404 after redeploy</h2>
<p>Render's free tier filesystem is ephemeral — all files in <code>backend/generated/</code> are wiped on every deploy. The <code>song_history.json</code> records remain in code but the audio files are gone. Use a <strong>Render Disk</strong> (paid add-on) mounted at the generated directory to persist audio between deploys.</p>

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(rawPath) {
  const path = rawPath.replace(/\/$/, '') || '/docs';
  const page = P[path] || P['/docs'];
  const title = FLAT.find(n => n.path === path);
  document.title = 'Echo Echo Docs' + (title ? ' — ' + title.label : '');
  document.getElementById('content').innerHTML = page() + paginationHTML(path);
  renderSidebar(path);
  window.scrollTo(0, 0);
}

render(location.pathname);

// ─── MOBILE SIDEBAR ───────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('overlay');
  const btn = document.getElementById('hamburger');
  const open = sidebar.classList.toggle('open');
  btn.classList.toggle('open', open);
  overlay.classList.toggle('visible', open);
  document.body.style.overflow = open ? 'hidden' : '';
}

function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('hamburger').classList.remove('open');
  document.body.style.overflow = '';
}

// Close sidebar on nav item click (mobile)
document.getElementById('sidenav').addEventListener('click', e => {
  if (e.target.classList.contains('sidenav-item') && window.innerWidth <= 900) {
    closeSidebar();
  }
});

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });
</script>
